<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DialTrack - SQL Cloud</title>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#eee;margin:0;min-height:100vh;display:flex}
.sidebar{width:240px;background:#1b1b1b;padding:16px;box-sizing:border-box;border-right:1px solid #333}
.main{flex:1;padding:20px;box-sizing:border-box}
button{cursor:pointer;padding:10px;margin:5px 0;background:#222;color:#eee;border:1px solid #333;border-radius:8px;text-align:left;display:block;width:100%}
.navbtn.active{background:#2d5d66}
.card{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:14px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px;background:#2d5d66;margin-right:8px}
input,select,textarea{width:100%;box-sizing:border-box;padding:10px;border-radius:8px;border:1px solid #444;background:#111;color:#eee;margin-bottom:10px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:center;justify-content:center;padding:16px;z-index:100}
.modal.open{display:flex}
.modalbox{width:100%;max-width:520px;background:#1a1a1a;border:1px solid #333;border-radius:14px;padding:18px}
.table{width:100%;border-collapse:collapse}
.table th,.table td{border-bottom:1px solid #333;padding:10px;text-align:left}
.hidden{display:none}
.edit-btn{background:#3a3a3a;border:1px solid #555;display:inline-block;width:auto;padding:5px 10px;font-size:12px;margin-right:5px}
.del-btn{background:#5a1818;border:1px solid #822;display:inline-block;width:auto;padding:5px 10px;font-size:12px}
</style>
<script src="https://jsdelivr.net"></script>
</head>
<body>

<div class="sidebar">
<h2>DialTrack</h2>
<button class="navbtn active" onclick="showView('dashboard')">Dashboard</button>
<button class="navbtn" onclick="showView('campaigns')">Καμπάνιες</button>
<button class="navbtn" onclick="showView('numbers')">Αριθμοί</button>
<button class="navbtn" onclick="showView('history')">Ιστορικό</button>
<button style="background:#222;color:#66ff66;border:1px solid #2e6931;" onclick="loadData()">🔄 Ανανέωση</button>
</div>

<div class="main">
<div style="display:flex;gap:10px;margin-bottom:16px;">
<button style="width:auto" onclick="openModal('campModal')">+ Νέα Καμπάνια</button>
<button style="width:auto" onclick="openModal('numModal')">+ Νέος Αριθμός</button>
</div>

<div id="dashboard" class="view">
<div class="card"><h3>Σύνοψη (SQL Cloud)</h3><div id="stats"></div></div>
<div class="grid" id="campaignGrid"></div>
</div>

<div id="campaigns" class="view hidden">
<div class="card"><h3>Λίστα Καμπανιών</h3><div id="campaignList"></div></div>
</div>

<div id="numbers" class="view hidden">
<div class="card"><h3>Λίστα Αριθμών</h3><div id="numbersList"></div></div>
</div>

<div id="history" class="view hidden">
<div class="card"><h3>Ιστορικό Αλλαγών</h3>
<table class="table">
<thead><tr><th>Ημ/νία</th><th>Καμπάνια</th><th>Ενέργεια / Αλλαγή</th></tr></thead>
<tbody id="historyBody"></tbody>
</table>
</div>
</div>
</div>

<div class="modal" id="campModal">
<div class="modalbox">
<h3 id="campModalTitle">Νέα Καμπάνια</h3>
<label>Κωδικός</label><input id="campCode">
<label>Όνομα</label><input id="campName">
<label>Συνδεδεμένος Αριθμός</label><select id="campNumberSelect"></select>
<label>Σημείωση</label><textarea id="campNote" rows="2"></textarea>
<button onclick="saveCampaign()">Αποθήκευση</button>
<button style="background:#555" onclick="closeCampModal()">Κλείσιμο</button>
</div>
</div>

<div class="modal" id="numModal">
<div class="modalbox">
<h3>Νέος Αριθμός</h3>
<label>Αριθμός</label><input id="numValue">
<label>Ετικέτα</label><input id="numLabel">
<button onclick="saveNumber()">Αποθήκευση</button>
<button style="background:#555" onclick="closeModal('numModal')">Κλείσιμο</button>
</div>
</div>
<script>
const SUPABASE_URL = "https://arlpuqxklhdocaeyevrr.supabase.co";
const SUPABASE_KEY = "sb_publishable_b4ZPk4iQPOuf76eoQAslBQ_yKrGMl2n";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let campaigns = [], numbers = [], history = [];
let editCampId = null;

async function loadData() {
    try {
        const resCamps = await supabase.from('campaigns').select('*').order('created_at', { ascending: false });
        const resNums = await supabase.from('numbers').select('*').order('created_at', { ascending: false });
        const resHist = await supabase.from('history').select('*').order('created_at', { ascending: false });

        campaigns = resCamps.data || [];
        numbers = resNums.data || [];
        history = resHist.data || [];
        render();
    } catch (e) { console.error("Σφάλμα φόρτωσης:", e); }
}

function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    document.querySelectorAll('.navbtn').forEach(b => b.classList.toggle('active', b.getAttribute('onclick').includes(id)));
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function closeCampModal() {
    closeModal('campModal');
    editCampId = null;
    document.getElementById('campModalTitle').innerText = "Νέα Καμπάνια";
    document.getElementById('campCode').value = "";
    document.getElementById('campName').value = "";
    document.getElementById('campNote').value = "";
    document.getElementById('campNumberSelect').value = "";
}

function render() {
    document.getElementById('stats').innerHTML = '<div class="badge">Καμπάνιες: ' + campaigns.length + '</div><div class="badge">Αριθμοί: ' + numbers.length + '</div>';
    
    let opts = '<option value="">Χωρίς Αριθμό</option>';
    numbers.forEach(n => opts += '<option value="' + n.id + '">' + n.number + ' (' + (n.label || '—') + ')</option>');
    document.getElementById('campNumberSelect').innerHTML = opts;

    let grid = '', list = '';
    campaigns.forEach(c => {
        const n = numbers.find(num => String(num.id) === String(c.active_num_id));
        const dispNum = n ? n.number : 'Χωρίς Αριθμό';
        const label = c.code ? c.code + ' - ' + c.name : c.name;
        
        grid += '<div class="card"><strong>' + label + '</strong><br><small>Ενεργός Αριθμός: ' + dispNum + '</small><br><div style="margin-top:8px"><button class="edit-btn" onclick="openEditCamp(' + c.id + ')">🔄 Αλλαγή Αριθμού</button><button class="del-btn" onclick="deleteItem(\'campaigns\',' + c.id + ')">Διαγραφή</button></div></div>';
        list += '<div class="card"><strong>' + label + '</strong> - ' + (c.note || '—') + '</div>';
    });
    document.getElementById('campaignGrid').innerHTML = grid || '<div class="small">Καμία καμπάνια</div>';
    document.getElementById('campaignList').innerHTML = list || '<div class="small">Καμία καμπάνια</div>';

    let numHtml = '';
    numbers.forEach(n => numHtml += '<div class="card"><strong>' + n.number + '</strong> (' + (n.label || '—') + ')<br><button class="del-btn" style="margin-top:5px" onclick="deleteItem(\'numbers\',' + n.id + ')">Διαγραφή</button></div>');
    document.getElementById('numbersList').innerHTML = numHtml || '<div class="small">Κανένας αριθμός</div>';

    let histHtml = '';
    history.forEach(h => {
        histHtml += '<tr><td>' + new Date(h.created_at).toLocaleString('el-GR') + '</td><td><strong>' + h.camp_name + '</strong></td><td>' + h.note + '</td></tr>';
    });
    document.getElementById('historyBody').innerHTML = histHtml || '<tr><td colspan="3">Κενό ιστορικό</td></tr>';
}

async function saveCampaign() {
    const name = document.getElementById('campName').value.trim();
    const code = document.getElementById('campCode').value.trim();
    const note = document.getElementById('campNote').value.trim();
    const active_num_id = document.getElementById('campNumberSelect').value || null;
    
    if(!name) return alert('Βάλε όνομα!');

    const selectedNumObj = numbers.find(num => String(num.id) === String(active_num_id));
    const nextNumText = selectedNumObj ? selectedNumObj.number : 'Χωρίς Αριθμό';
    const currentLabel = code ? code + ' - ' + name : name;

    closeCampModal();

    try {
        if(editCampId) {
            const oldCamp = campaigns.find(c => String(c.id) === String(editCampId));
            const oldNumObj = numbers.find(num => String(num.id) === String(oldCamp.active_num_id));
            const prevNumText = oldNumObj ? oldNumObj.number : 'Χωρίς Αριθμό';

            if (String(oldCamp.active_num_id) !== String(active_num_id)) {
                await supabase.from('history').insert([{ camp_name: currentLabel, note: 'Ο αριθμός άλλαξε από ' + prevNumText + ' σε ' + nextNumText }]);
            }
            await supabase.from('campaigns').update({ code, name, note, active_num_id }).eq('id', editCampId);
        } else {
            await supabase.from('campaigns').insert([{ code, name, note, active_num_id }]);
            await supabase.from('history').insert([{ camp_name: currentLabel, note: 'Δημιουργία καμπάνιας με αριθμό: ' + nextNumText }]);
        }
    } catch(err) { console.error("Αποτυχία αποθήκευσης καμπάνιας:", err); }
    
    loadData();
}

function openEditCamp(id) {
    editCampId = id;
    const c = campaigns.find(x => String(x.id) === String(id));
    if(c) {
        document.getElementById('campModalTitle').innerText = "Επεξεργασία / Αλλαγή Αριθμού";
        document.getElementById('campCode').value = c.code || '';
        document.getElementById('campName').value = c.name || '';
        document.getElementById('campNote').value = c.note || '';
        document.getElementById('campNumberSelect').value = c.active_num_id || '';
        openModal('campModal');
    }
}

async function saveNumber() {
    const val = document.getElementById('numValue').value.trim();
    if(!val) return alert('Βάλε αριθμό!');
    closeModal('numModal');

    try {
        await supabase.from('numbers').insert([{ number: val, label: document.getElementById('numLabel').value.trim() }]);
    } catch(err) { console.error("Αποτυχία αποθήκευσης αριθμού:", err); }
    
    loadData();
}

async function deleteItem(type, id) {
    if(!confirm('Θέλετε σίγουρα διαγραφή;')) return;
    try {
        if(type === 'campaigns') { 
            const c = campaigns.find(camp => String(camp.id) === String(id));
            const label = c ? (c.code ? c.code + ' - ' : '') + c.name : 'Καμπάνια';
            await supabase.from('history').insert([{ camp_name: label, note: 'Διαγραφή καμπάνιας' }]);
            await supabase.from('campaigns').delete().eq('id', id);
        } else { 
            await supabase.from('numbers').delete().eq('id', id);
        }
    } catch(err) { console.error("Αποτυχία διαγραφής:", err); }
    
    loadData();
}

window.onload = () => {
    loadData();
    setInterval(loadData, 10000);
};
</script>
</body>
</html>
